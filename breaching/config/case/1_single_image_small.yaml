name: single_image_small

defaults:
  - data: CIFAR10
  - impl: default
  - server: honest-but-curious
  - user: local_gradient
  - _self_

model: vit_small

# model: vit_small # Will also work


# Optional ViT PEFT configuration.
peft:
  enabled: True
  type: lora  # choices: vpt, lora
  vpt:
    num_tokens: 16
    dropout: 0.0
    project: -1
    deep: false
    num_deep_layers:
    prompt_mlp_layers: 0
    pop_index: 2 # 0 for lora, 2 for vpt (after the first two blocks of the transformer)
  lora:
    rank: 64
    alpha: 128
    dropout: 0.0
    target_modules: [q, k, v] # choices q, k, v, mlp
    pop_index: 0 # 0 for lora, 2 for vpt (after the first two blocks of the transformer)

user:
  provide_labels: True
  num_data_points: 1

# Server and user:
num_queries: 1
