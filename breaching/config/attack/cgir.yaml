defaults:
  - _default_optimization_attack
  - _self_
type: generativegia
attack_type: cgir
label-strategy: bias-corrected # yin used in paper, but bias_corrected is better in practice. See the paper for details.

objective:
  type: cosine-similarity
  scale: 1.0 # need to have a much smaller scale like 0.0001 for euclidean objectives
  posembed_scale: 0.01
  task_regularization: 0.0

generator:
  # type: dcgan
  z_dim: 100
  ngf: 64
  nc: 3
  # network_wts: "${hydra:runtime.cwd}/breaching/pretrained/DCGAN/netG_epoch_199.pth"
  type: styleganxl
  network_wts: "${hydra:runtime.cwd}/breaching/pretrained/StyleGANXL/cifar10.pkl"
  # type: biggan
  # network_wts: "${hydra:runtime.cwd}/breaching/pretrained/BigGAN/biggan-deep-256-pytorch_model.bin"
  # type: stylegan2
  # network_wts: "${hydra:runtime.cwd}/breaching/pretrained/StyleGAN2/cifar10.pkl"

restarts:
  num_trials: 1
  scoring: "cosine-similarity"

optim:
  optimizer: adam
  signed:
  step_size: 0.001
  momentum: 0.9
  boxed: False
  max_iterations: 500
  fine_iterations: 500
  step_size_decay: step-lr

  callback: 100 # Print objective value every callback many iterations

regularization:
  total_variation:
    scale: 0.0001 # 0.2 # The old version did not take the mean dx + dy as the new version, so this corresponds to 0.1 in the old repo
    inner_exp: 1
    outer_exp: 1
  label_regularization:
    scale: 0.01
    
